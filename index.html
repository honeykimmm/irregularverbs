<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Verb Galaxy">
<link rel="manifest" href="manifest-beginner.json">
<link rel="apple-touch-icon" href="icon-beginner-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06091a">
<title>Verb Galaxy — 초급</title>
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    height: 100%;
    background: #06091a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #ffffff;
    overflow-x: hidden;
  }

  /* ── STAR CANVAS ── */
  #starCanvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ── APP SHELL ── */
  #app {
    position: relative; z-index: 1;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 16px 32px;
    display: flex;
    flex-direction: column;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* ══════════════════════════════
     START SCREEN
  ══════════════════════════════ */
  #screen-start {
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0;
    padding-top: 20px;
  }
  .logo-wrap { margin-bottom: 20px; }
  .logo-rocket {
    font-size: 64px;
    display: block;
    animation: rocketHover 2.5s ease-in-out infinite;
    margin-bottom: 12px;
  }
  @keyframes rocketHover {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }
  .logo-title {
    font-size: 28px; font-weight: 900;
    color: #ffffff;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-shadow: 0 0 30px rgba(51,153,221,0.6);
  }
  .logo-subtitle { font-size: 13px; color: #7799bb; margin-bottom: 6px; }
  .logo-badge {
    display: inline-block;
    font-size: 11px; font-weight: 700;
    color: #aaffcc;
    background: #0a2818;
    border: 1px solid #2a8855;
    padding: 3px 14px;
    border-radius: 20px;
  }

  .info-card {
    width: 100%;
    background: #0f1e35;
    border: 1px solid #1e3050;
    border-radius: 14px;
    padding: 16px;
    margin: 18px 0 16px;
    text-align: left;
  }
  .info-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
  .info-row:last-child { margin: 0; }
  .info-icon { font-size: 18px; min-width: 24px; margin-top: 1px; }
  .info-text { font-size: 13px; color: #8aabcc; line-height: 1.6; }
  .info-text strong { color: #ffffff; }

  .section-label {
    width: 100%;
    font-size: 12px; font-weight: 700;
    color: #7799bb;
    text-align: left;
    margin-bottom: 8px;
  }

  /* 문항 수 선택 */
  .qcount-row { display: flex; gap: 8px; width: 100%; margin-bottom: 18px; }
  .qcount-btn {
    flex: 1;
    padding: 11px 4px;
    border-radius: 10px;
    border: 2px solid #1e3050;
    background: #0f1e35;
    color: #8aabcc;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .qcount-btn.active {
    border-color: #3399dd;
    background: #0a2040;
    color: #ffffff;
    box-shadow: 0 0 12px rgba(51,153,221,0.3);
  }

  .start-btn {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, #1a6abf, #0d4a9f);
    color: #ffffff;
    border: none;
    border-radius: 12px;
    font-size: 18px; font-weight: 900;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(26,106,191,0.4);
    transition: all 0.15s;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(26,106,191,0.5); }
  .start-btn:active { transform: translateY(0); }

  /* ══════════════════════════════
     GAME SCREEN
  ══════════════════════════════ */
  #screen-game { gap: 0; }

  /* HUD */
  .hud {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: #0f1e35;
    border-radius: 12px;
    border: 1px solid #1e3050;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .hud-title { font-size: 12px; font-weight: 700; color: #7799bb; white-space: nowrap; }
  .hp-row { display: flex; gap: 2px; }
  .hp { font-size: 14px; transition: all 0.2s; }
  .hp.dead { opacity: 0.2; filter: grayscale(1); }
  .prog-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .prog-label { font-size: 10px; color: #445566; text-align: right; }
  .prog-track { height: 5px; background: #1a2a3a; border-radius: 4px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, #3399dd, #55bbff); border-radius: 4px; transition: width 0.4s; }
  .score-pill {
    font-size: 12px; font-weight: 700; color: #ffcc44;
    background: #1a1500; border: 1px solid #886600;
    padding: 2px 10px; border-radius: 20px; white-space: nowrap;
  }

  /* SHIP BAR */
  .ship-bar {
    display: flex; align-items: flex-end; justify-content: center;
    height: 140px; margin-bottom: 12px; flex-shrink: 0;
    position: relative;
  }
  .ship-slot { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .ship-emoji { transition: all 0.4s; line-height: 1; }
  .ship-name { font-size: 9px; color: #445566; margin-top: 3px; font-weight: 600; }
  .ship-slot.cur .ship-name { color: #ffcc44; }
  .dot-row { display: flex; gap: 3px; margin-top: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #1e3050; }
  .dot.on { background: #ffcc44; }

  /* QUESTION CARD */
  .qcard {
    background: #0f1e35;
    border: 2px solid #1e3050;
    border-radius: 16px;
    padding: 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .q-num { font-size: 11px; font-weight: 700; color: #445566; }
  .q-streak {
    font-size: 11px; font-weight: 700; color: #ffaa44;
    opacity: 0; transition: opacity 0.3s;
  }
  .q-streak.show { opacity: 1; }

  .verb-area { text-align: center; padding: 16px 0 12px; border-bottom: 1px solid #1e3050; margin-bottom: 16px; }
  .verb-word { font-size: 42px; font-weight: 900; color: #ffffff; letter-spacing: 2px; }
  .verb-meaning { font-size: 14px; color: #8aabcc; margin-top: 6px; }

  /* CHOICES */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .choice-btn {
    padding: 15px 8px;
    background: #162035;
    border: 2px solid #243560;
    border-radius: 11px;
    color: #ffffff;
    font-size: 16px; font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    text-align: center;
    transition: all 0.12s;
    width: 100%;
  }
  .choice-btn:hover:not(:disabled) {
    background: #1e2f50;
    border-color: #4477aa;
    transform: translateY(-1px);
  }
  .choice-btn.correct {
    background: #082818 !important;
    border-color: #22aa66 !important;
    color: #44ffaa !important;
    box-shadow: 0 0 14px rgba(34,170,102,0.3);
  }
  .choice-btn.wrong {
    background: #200808 !important;
    border-color: #aa3333 !important;
    color: #ffaaaa !important;
  }
  .choice-btn.reveal {
    background: #082818 !important;
    border-color: #22aa66 !important;
    color: #44ffaa !important;
  }

  .feedback-row { min-height: 22px; text-align: center; font-size: 13px; font-weight: 700; color: #8aabcc; margin-bottom: 8px; }

  .next-btn {
    display: none;
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, #1a6abf, #0d4a9f);
    color: #ffffff;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    margin-top: auto;
  }
  .next-btn:hover { background: linear-gradient(135deg, #2277cc, #1255aa); }

  /* ══════════════════════════════
     UPGRADE POPUP
  ══════════════════════════════ */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .overlay.show { display: flex; }

  .upgrade-box {
    background: linear-gradient(145deg, #0a1830, #060e20);
    border: 2px solid #3399dd;
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    max-width: 300px; width: 90%;
    position: relative; overflow: hidden;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .up-label { font-size: 11px; font-weight: 700; color: #3399dd; letter-spacing: 3px; margin-bottom: 10px; }
  .up-ship { font-size: 58px; display: block; margin: 8px 0; }
  .up-name { font-size: 21px; font-weight: 900; color: #ffffff; margin-bottom: 6px; }
  .up-desc { font-size: 13px; color: #8aabcc; margin-bottom: 22px; line-height: 1.6; }
  .up-btn {
    padding: 12px 28px;
    background: linear-gradient(135deg, #1a6abf, #0d4a9f);
    color: #ffffff; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }

  .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute; width: 7px; height: 7px; border-radius: 50%;
    animation: particleFloat 1.6s ease-out forwards;
  }
  @keyframes particleFloat {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); }
  }

  /* ══════════════════════════════
     MISSION COMPLETE
  ══════════════════════════════ */
  .mission-box {
    text-align: center;
    max-width: 360px; width: 94%;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .mc-glow {
    font-size: 58px; display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px #ffcc44);
    animation: pulseGlow 1.5s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%,100% { filter: drop-shadow(0 0 15px #ffcc44); }
    50% { filter: drop-shadow(0 0 35px #ffcc44); }
  }
  .mc-label {
    font-size: 11px; font-weight: 700; color: #ffcc44;
    letter-spacing: 4px; margin-bottom: 8px;
  }
  .mc-title { font-size: 30px; font-weight: 900; color: #ffffff; margin-bottom: 4px; line-height: 1.2; }
  .mc-stars { font-size: 26px; letter-spacing: 3px; margin: 14px 0 6px; }
  .mc-score { font-size: 52px; font-weight: 900; color: #ffcc44; line-height: 1; }
  .mc-total { font-size: 15px; color: #8aabcc; margin-bottom: 16px; }
  .mc-rank-box {
    background: rgba(15,30,53,0.9);
    border: 1px solid #1e3050;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .mc-rank { font-size: 18px; font-weight: 900; margin-bottom: 4px; }
  .mc-desc { font-size: 12px; color: #8aabcc; line-height: 1.6; }

  .mc-wrong-wrap {
    background: rgba(15,30,53,0.9);
    border: 1px solid #1e3050;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 16px;
    max-height: 130px;
    overflow-y: auto;
    text-align: left;
  }
  .mc-wrong-title { font-size: 11px; color: #445566; font-weight: 700; margin-bottom: 8px; }
  .wi { display: flex; gap: 8px; align-items: center; font-size: 12px; padding: 3px 0; border-bottom: 1px solid #0f1e35; }
  .wi:last-child { border: none; }
  .wi-b { color: #ffffff; font-weight: 700; min-width: 64px; }
  .wi-arr { color: #334466; }
  .wi-a { color: #44ddaa; font-weight: 600; }
  .wi-m { color: #445566; margin-left: auto; font-size: 11px; }

  .mc-btns { display: flex; gap: 8px; }
  .mc-btn-home {
    flex: 1; padding: 12px;
    background: rgba(10,20,40,0.8);
    color: #8aabcc; border: 1.5px solid #1e3050;
    border-radius: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .mc-btn-home:hover { border-color: #3399dd; }
  .mc-btn-again {
    flex: 2; padding: 12px;
    background: linear-gradient(135deg, #1a6abf, #0d4a9f);
    color: #ffffff; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .mc-btn-again:hover { background: linear-gradient(135deg, #2277cc, #1255aa); }


  /* ── TIME ATTACK MODE ── */
  .mode-select { display:flex; gap:8px; margin-bottom:0; }
  .mode-select-hidden { display:none; }

  .ta-timer-ring {
    position: relative;
    width: 70px; height: 70px;
    flex-shrink: 0;
  }
  .ta-timer-ring svg { transform: rotate(-90deg); }
  .ta-ring-bg { fill:none; stroke:#1a2a3a; stroke-width:5; }
  .ta-ring-fill { fill:none; stroke:#3399dd; stroke-width:5; stroke-linecap:round;
    stroke-dasharray:188; stroke-dashoffset:0; transition:stroke-dashoffset 0.1s linear; }
  .ta-ring-fill.warn { stroke:#ff6633; }
  .ta-ring-num {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:900; color:#ffffff;
    font-family:'Segoe UI',system-ui,sans-serif;
  }
  .ta-ring-num.warn { color:#ff6633; }

  .ta-choices { display:flex; gap:10px; margin-bottom:10px; }
  .ta-choice {
    flex:1; padding:18px 8px;
    background:#162035; border:2px solid #243560;
    border-radius:11px; color:#ffffff;
    font-size:18px; font-weight:800;
    font-family:inherit; cursor:pointer;
    text-align:center; transition:all 0.12s;
  }
  .ta-choice:hover:not(:disabled) { background:#1e2f50; border-color:#4477aa; transform:translateY(-2px); }
  .ta-choice.correct { background:#082818!important; border-color:#22aa66!important; color:#44ffaa!important; }
  .ta-choice.wrong   { background:#200808!important; border-color:#aa3333!important; color:#ffaaaa!important; }
  .ta-choice.reveal  { background:#082818!important; border-color:#22aa66!important; color:#44ffaa!important; }

  .ta-confirm-btn {
    width:100%; padding:13px;
    background:linear-gradient(135deg,#1a6abf,#0d4a9f);
    color:#ffffff; border:none; border-radius:10px;
    font-size:14px; font-weight:700;
    cursor:pointer; font-family:inherit; margin-bottom:8px;
    display:none;
  }
  .ta-confirm-btn:hover { background:linear-gradient(135deg,#2277cc,#1255aa); }
  .ta-confirm-btn:disabled { opacity:0.4; cursor:default; }

  .ta-header { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
  .ta-verb-area { flex:1; text-align:center; padding:14px 0 10px; border-bottom:1px solid #1e3050; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a1020; }
  ::-webkit-scrollbar-thumb { background: #1e3050; border-radius: 4px; }
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div id="app">

  <!-- ── START ── -->
  <section id="screen-start" class="screen active">
    <div class="logo-wrap">
      <span class="logo-rocket">🚀</span>
      <div class="logo-title">VERB GALAXY</div>
      <div class="logo-subtitle">불규칙 동사 우주 탐험</div>
      <span class="logo-badge">🌿 초급편</span>
    </div>

    <div class="info-card">
      <div class="info-row">
        <span class="info-icon">🎯</span>
        <div class="info-text"><strong>과거형 맞추기</strong> — 원형을 보고 올바른 과거형을 4개 보기에서 골라요</div>
      </div>
      <div class="info-row">
        <span class="info-icon">🚀</span>
        <div class="info-text"><strong>우주선 업그레이드</strong> — 문제를 맞힐 때마다 우주선이 진화해요!</div>
      </div>
      <div class="info-row">
        <span class="info-icon">❤️</span>
        <div class="info-text"><strong>HP 5개</strong> — 틀릴 때마다 감소. 0이 되면 임무 실패!</div>
      </div>
    </div>

    <div class="section-label">🎮 문항 수 선택</div>
    <div class="qcount-row" id="qcount-row"></div>

    <div style="margin-bottom:16px">
      <div class="section-label">🎮 모드 선택</div>
      <div class="mode-select">
        <button class="qcount-btn active" id="mode-normal" onclick="selectGameMode('normal')" style="font-size:13px">🎯 기본 모드<br><span style="font-size:11px;font-weight:500;opacity:0.8">4지선다</span></button>
        <button class="qcount-btn" id="mode-timeattack" onclick="selectGameMode('timeattack')" style="font-size:13px">⚡ 타임어택<br><span style="font-size:11px;font-weight:500;opacity:0.8">3초 2지선다</span></button>
      </div>
    </div>
    <button class="start-btn" id="start-btn">🚀 탐험 시작!</button>
  </section>

  <!-- ── GAME ── -->
  <section id="screen-game" class="screen">
    <div class="hud">
      <div class="hud-title">🚀 초급</div>
      <div class="hp-row" id="hp-row"></div>
      <div class="prog-wrap">
        <div class="prog-label" id="prog-label">0 / 20</div>
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="score-pill" id="score-pill">⭐ 0</div>
    </div>

    <div class="ship-bar" id="ship-bar"></div>

    <div class="qcard">
      <div class="q-meta">
        <div class="q-num" id="q-num">Q1 / 20</div>
        <div class="q-streak" id="q-streak">🔥 연속 3개!</div>
      </div>
      <div class="verb-area" id="verb-header">
        <div class="verb-word" id="verb-word">buy</div>
        <div class="verb-meaning" id="verb-meaning">사다</div>
      </div>
      <div id="normal-area">
      <div class="choices" id="choices"></div>
      <button class="ta-confirm-btn" id="normal-confirm-btn" style="margin-top:8px">확인</button>
    </div>
    <div id="ta-area" style="display:none">
      <!-- 타이머 링 -->
      <div style="display:flex;justify-content:center;margin-bottom:14px">
        <div class="ta-timer-ring" id="ta-timer-ring">
          <svg width="70" height="70" viewBox="0 0 70 70">
            <circle class="ta-ring-bg" cx="35" cy="35" r="30"/>
            <circle class="ta-ring-fill" id="ta-ring-fill" cx="35" cy="35" r="30"/>
          </svg>
          <div class="ta-ring-num" id="ta-ring-num">3</div>
        </div>
      </div>
      <!-- 동사 표시 -->
      <div class="verb-area" style="margin-bottom:16px">
        <div class="verb-word" id="ta-verb-word"></div>
        <div class="verb-meaning" id="ta-verb-mean"></div>
      </div>
      <!-- 2지선다 -->
      <div class="ta-choices" id="ta-choices"></div>
      <button class="ta-confirm-btn" id="ta-confirm-btn">확인</button>
    </div>
      <div class="feedback-row" id="feedback"></div>
      <button class="next-btn" id="next-btn">다음 →</button>
    </div>
  </section>

</div>

<!-- ── UPGRADE POPUP ── -->
<div class="overlay" id="upgrade-overlay">
  <div class="upgrade-box">
    <div class="particles" id="particles"></div>
    <div class="up-label">SHIP UPGRADE!</div>
    <span class="up-ship" id="up-ship">🚀</span>
    <div class="up-name" id="up-name"></div>
    <div class="up-desc" id="up-desc"></div>
    <button class="up-btn" id="up-btn">계속 탐험하기 →</button>
  </div>
</div>

<!-- ── MISSION COMPLETE ── -->
<div class="overlay" id="mission-overlay">
  <div class="mission-box">
    <span class="mc-glow" id="mc-glow">🏆</span>
    <div class="mc-label" id="mc-label">MISSION COMPLETE</div>
    <div class="mc-title" id="mc-title">임무 완료!</div>
    <div class="mc-stars" id="mc-stars">⭐⭐⭐⭐⭐</div>
    <div class="mc-score" id="mc-score">20</div>

</div>

<script>
'use strict';

/* ── STAR CANVAS ── */
(function () {
  const c = document.getElementById('starCanvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize() {
    c.width = innerWidth; c.height = innerHeight; stars = [];
    for (let i = 0; i < 140; i++) {
      stars.push({ x: Math.random() * c.width, y: Math.random() * c.height,
        r: Math.random() * 1.5 + 0.2, o: Math.random() * 0.6 + 0.1,
        s: (Math.random() * 0.3 + 0.05) * (Math.random() < 0.5 ? 1 : -1) });
    }
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    stars.forEach(s => {
      s.o += s.s * 0.008;
      if (s.o > 0.8 || s.o < 0.1) s.s *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(140,190,230,${s.o})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  addEventListener('resize', resize); resize(); draw();
})();

/* ── DATA ── */
const VERBS = [

  {b:'do',p:'did',pp:'done',m:'하다'},{b:'have',p:'had',pp:'had',m:'가지다'},

  {b:'get',p:'got',pp:'got',m:'얻다'},{b:'see',p:'saw',pp:'seen',m:'보다'},
  {b:'take',p:'took',pp:'taken',m:'가져가다'},{b:'give',p:'gave',pp:'given',m:'주다'},
  {b:'buy',p:'bought',pp:'bought',m:'사다'},{b:'eat',p:'ate',pp:'eaten',m:'먹다'},
  {b:'run',p:'ran',pp:'run',m:'달리다'},{b:'know',p:'knew',pp:'known',m:'알다'},
  {b:'think',p:'thought',pp:'thought',m:'생각하다'},{b:'find',p:'found',pp:'found',m:'발견하다'},

  {b:'sit',p:'sat',pp:'sat',m:'앉다'},{b:'hear',p:'heard',pp:'heard',m:'듣다'},
  {b:'keep',p:'kept',pp:'kept',m:'유지하다'},{b:'teach',p:'taught',pp:'taught',m:'가르치다'},

  {b:'send',p:'sent',pp:'sent',m:'보내다'},{b:'build',p:'built',pp:'built',m:'세우다'},
  {b:'sleep',p:'slept',pp:'slept',m:'자다'},{b:'bring',p:'brought',pp:'brought',m:'가져오다'},
  {b:'hold',p:'held',pp:'held',m:'쥐다'},{b:'catch',p:'caught',pp:'caught',m:'잡다'},

  {b:'read',p:'read',pp:'read',m:'읽다'},{b:'set',p:'set',pp:'set',m:'배치하다'},
];

const SHIPS = [
  { name:'낡은 탐사정', e:'🛸', desc:'녹슨 엔진으로 간신히 날고 있어요...' },
  { name:'기초 로켓',   e:'🚀', desc:'1단계 엔진 장착! 속도가 붙었어요.' },
  { name:'스텔스 크루저', e:'🛩️', desc:'레이더 회피 시스템 업그레이드!' },
  { name:'광자 구축함', e:'⚡', desc:'광자 추진 엔진. 빛의 속도로 달려요!' },
  { name:'은하 전함',   e:'🌟', desc:'은하계 최강 우주선으로 진화 완료!' },
];

const RANKS = [
  { min:1.0,  rank:'🏆 은하 영웅',    desc:'완벽한 탐험가! 불규칙 동사를 완전히 정복했어요!' },
  { min:0.85, rank:'🚀 스타 파일럿',  desc:'훌륭해요! 거의 완벽한 실력이에요.' },
  { min:0.7,  rank:'⭐ 우주 탐험가',  desc:'잘했어요! 조금만 더 연습하면 완벽해져요.' },
  { min:0.5,  rank:'🛸 견습 조종사',  desc:'절반 성공! 틀린 단어 복습 후 재도전해봐요.' },
  { min:0,    rank:'☄️ 훈련 중',      desc:'아직 연습이 더 필요해요. 포기하지 마세요!' },
];

const Q_OPTIONS = [10, 15, 20, 30];
const OK_MSG = ['정답! 🎯', '완벽해요! ✨', '레이저 명중! 💥', '은하계 최강! 🌟', '정확해요! 💫'];
const NG_MSG = ['오답이에요 😅', '에너지 손실! ⚡', '아쉬워요...', '다시 생각해봐요!'];

/* ── STATE ── */
let TOTAL = 20;
let gameMode = 'normal'; // 'normal' | 'timeattack'
let queue, idx, hp, stars, streak, answered, wrongList, upgradePending;
let taTimer, taSelected;

/* ── UTILS ── */
const $ = id => document.getElementById(id);
const rnd = arr => arr[0 | Math.random() * arr.length];
function selectGameMode(m) {
  gameMode = m;
  document.getElementById('mode-normal').classList.toggle('active', m==='normal');
  document.getElementById('mode-timeattack').classList.toggle('active', m==='timeattack');
}

function shuffle(a) {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = 0 | Math.random() * (i + 1);
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

/* ── DISTRACTOR ENGINE ── */
function makeTypo(correct, base) {
  const w = correct;
  if (w.length <= 2) return w + 'ed';
  const res = [];
  const vm = { a:['e','o'], e:['a','i'], i:['e','a'], o:['u','a'], u:['o','i'] };
  for (let i = 0; i < w.length; i++) {
    if (vm[w[i]]) vm[w[i]].forEach(v => res.push(w.slice(0,i)+v+w.slice(i+1)));
  }
  if (w.endsWith('ght'))   res.push(w.replace(/ght$/, 'gt'));
  if (w.endsWith('ought')) res.push(w.replace('ought', 'ougth'));
  if (w.endsWith('aught')) res.push(w.replace('aught', 'augt'));
  if (w.endsWith('t'))     res.push(w.slice(0,-1) + 'ed');
  if (w.endsWith('d') && !w.endsWith('ed')) res.push(w.slice(0,-1) + 't');
  if (w.length >= 4)       res.push(w.slice(0,-2) + w[w.length-1] + w[w.length-2]);
  res.push(w + w[w.length-1]);
  const valid = res.filter(s => s !== correct && s !== base && s.length >= 2);
  return valid.length ? valid[0 | Math.random() * valid.length] : w + 'e';
}

function makeChoices(verb) {
  const b = verb.b, p = verb.p;
  const reg = b.endsWith('e') ? b+'d' : /[^aeiou]y$/.test(b) ? b.slice(0,-1)+'ied' : b+'ed';
  const orig = b === p ? b+'s' : b;
  const typo = makeTypo(p, b);
  const seen = new Set([p]); const out = [p];
  for (const c of [reg, orig, typo]) {
    if (c && !seen.has(c) && c.length >= 2) { seen.add(c); out.push(c); }
    if (out.length === 4) break;
  }
  const fallback = ['goed','comed','buyed','thinked','wined','losted','sleeped','holded','cuted'];
  for (const f of fallback) {
    if (out.length >= 4) break;
    if (!seen.has(f)) { seen.add(f); out.push(f); }
  }
  return shuffle(out.slice(0, 4));
}

/* ── SCREEN MANAGER ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

/* ── INIT Q-COUNT BUTTONS ── */
(function initQButtons() {
  const row = $('qcount-row');
  Q_OPTIONS.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'qcount-btn' + (n === 20 ? ' active' : '');
    btn.textContent = n + '문제';
    btn.onclick = () => {
      TOTAL = n;
      document.querySelectorAll('.qcount-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    row.appendChild(btn);
  });
})();

/* ── START GAME ── */
function startGame() {
  queue = shuffle([...VERBS]).slice(0, TOTAL);
  idx = 0; hp = 5; stars = 0; streak = 0;
  answered = false; wrongList = []; upgradePending = false;
  showScreen('screen-game');
  renderHUD(); renderShips(); loadQ();
}

/* ── HUD ── */
function renderHUD() {
  const row = $('hp-row'); row.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const s = document.createElement('span');
    s.className = 'hp' + (i >= hp ? ' dead' : '');
    s.textContent = '❤️'; row.appendChild(s);
  }
  $('prog-label').textContent = idx + ' / ' + TOTAL;
  $('prog-fill').style.width = (idx / TOTAL * 100) + '%';
  $('score-pill').textContent = '⭐ ' + stars;
}

/* ── SHIP BAR ── */
function renderShips() {
  const bar = $('ship-bar'); bar.innerHTML = '';
  const upgPer = Math.max(1, Math.floor(TOTAL / 5));
  const stage = Math.min(Math.floor(stars / upgPer), 4);
  SHIPS.forEach((s, i) => {
    const slot = document.createElement('div');
    slot.className = 'ship-slot' + (i === stage ? ' cur' : '');
    const scale = i === stage ? 2.8 : 0.7 + i * 0.12;
    const opacity = i <= stage ? 1 : 0.12;
    const glow = i === stage ? 'drop-shadow(0 0 12px #3399dd)' : 'none';
    const em = document.createElement('div');
    em.className = 'ship-emoji';
    em.style.cssText = `font-size:${28*scale}px;opacity:${opacity};filter:${glow};`;
    em.textContent = s.e;
    slot.appendChild(em);
    const lbl = document.createElement('div');
    lbl.className = 'ship-name';
    lbl.textContent = i === stage ? s.name : '';
    slot.appendChild(lbl);
    if (i === stage) {
      const dr = document.createElement('div'); dr.className = 'dot-row';
      const filled = (stars > 0 && stars % upgPer === 0) ? upgPer : stars % upgPer;
      for (let d = 0; d < Math.min(upgPer, 5); d++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (d < filled ? ' on' : '');
        dr.appendChild(dot);
      }
      slot.appendChild(dr);
    }
    bar.appendChild(slot);
  });
}

/* ── LOAD QUESTION ── */
function loadQ() {
  if (idx >= TOTAL) { showMissionComplete(); return; }
  answered = false;
  const v = queue[idx];
  $('q-num').textContent = 'Q' + (idx+1) + ' / ' + TOTAL;
  $('verb-word').textContent = v.b;
  $('verb-meaning').textContent = v.m;
  $('feedback').textContent = '';
  $('feedback').style.color = '#8aabcc';
  $('next-btn').style.display = 'none';
  const streak_el = $('q-streak');
  streak_el.textContent = '🔥 ' + streak + '연속!';
  streak_el.classList.toggle('show', streak >= 3);

  if (gameMode === 'timeattack') {
    $('normal-area').style.display = 'none';
    $('ta-area').style.display = 'block';
    // qcard 상단 헤더도 숨기기
    $('verb-header').style.display = 'none';
    loadTA(v);
  } else {
    $('verb-header').style.display = '';
    $('normal-area').style.display = 'block';
    $('ta-area').style.display = 'none';
    const opts = makeChoices(v);
    const grid = $('choices'); grid.innerHTML = '';
    let normalSelected = null;
    const confirmBtn = $('normal-confirm-btn');
    confirmBtn.style.display = 'none';
    confirmBtn.disabled = false;
    confirmBtn.onclick = () => {
      if (!normalSelected || answered) return;
      confirmBtn.disabled = true;
      pick(normalSelected.opt, v, normalSelected.btn, grid);
    };
    opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => {
        if (answered) return;
        // 선택 표시
        Array.from(grid.children).forEach(b => {
          b.setAttribute('style','display:block;width:100%;padding:14px 8px;background:#162035;border:2px solid #243560;border-radius:11px;color:#ffffff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center;');
        });
        btn.setAttribute('style','display:block;width:100%;padding:14px 8px;background:#0d1a2e;border:2px solid #3399dd;border-radius:11px;color:#ffffff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center;');
        normalSelected = {opt, btn};
        confirmBtn.style.display = 'block';
      });
      grid.appendChild(btn);
    });
  }
}

/* ── PICK ── */
function pick(chosen, verb, btn, grid) {
  if (answered) return;
  answered = true;
  Array.from(grid.children).forEach(b => b.disabled = true);
  const fb = $('feedback');
  const upgPer = Math.max(1, Math.floor(TOTAL / 5));

  if (chosen === verb.p) {
    btn.classList.add('correct');
    stars++; streak++;
    fb.textContent = rnd(OK_MSG); fb.style.color = '#44ddaa';
    renderHUD(); renderShips();
    if (stars > 0 && stars % upgPer === 0 && Math.floor(stars / upgPer) <= 4) {
      upgradePending = true;
    }
    // 정답: 0.6초 후 자동으로 다음 문제
    setTimeout(() => nextQ(), 600);
  } else {
    btn.classList.add('wrong');
    Array.from(grid.children).forEach(b => { if (b.textContent === verb.p) b.classList.add('reveal'); });
    hp = Math.max(0, hp - 1); streak = 0; wrongList.push(verb);
    fb.textContent = rnd(NG_MSG); fb.style.color = '#ff8888';
    renderHUD();
    document.activeElement && document.activeElement.blur();
    if (hp === 0) {
      const nb = $('next-btn');
      nb.textContent = '결과 보기 →';
      nb.onclick = showMissionComplete;
      nb.style.display = 'block';
      return;
    }
    $('next-btn').style.display = 'block';
  }
}

/* ── TIME ATTACK ── */
function loadTA(v) {
  clearInterval(taTimer);
  taSelected = null;
  answered = false;
  $('ta-verb-word').textContent = v.b;
  $('ta-verb-mean').textContent = v.m;
  $('feedback').textContent = '';
  $('next-btn').style.display = 'none';

  // 2지선다: 정답 + 오답 1개
  const wrongs = makeChoices(v).filter(c => c !== v.p);
  const opts = shuffle([v.p, wrongs[0]]);

  const grid = $('ta-choices'); grid.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ta-choice';
    btn.textContent = opt;
    btn.addEventListener('click', () => {
      if (answered) return;
      // 선택 표시
      Array.from(grid.children).forEach(b => b.style.borderColor = '#243560');
      btn.style.borderColor = '#3399dd';
      btn.style.background = '#0d1a2e';
      taSelected = opt;
      $('ta-confirm-btn').style.display = 'block';
    });
    grid.appendChild(btn);
  });

  $('ta-confirm-btn').style.display = 'none';
  $('ta-confirm-btn').disabled = false;

  // 타이머
  let t = 3;
  const ring = $('ta-ring-fill');
  const num = $('ta-ring-num');
  const circumference = 188;
  ring.setAttribute('class', 'ta-ring-fill');
  num.className = 'ta-ring-num';
  ring.style.strokeDashoffset = '0';
  num.textContent = t;

  taTimer = setInterval(() => {
    t -= 0.05;
    const offset = circumference * (1 - Math.max(t,0) / 3);
    ring.style.strokeDashoffset = offset;
    num.textContent = Math.ceil(Math.max(t,0));
    if (t <= 1) { ring.setAttribute('class', 'ta-ring-fill warn'); num.className = 'ta-ring-num warn'; }
    if (t <= 0) {
      clearInterval(taTimer);
      if (!answered) taTimeUp(v, grid);
    }
  }, 50);
}

function taTimeUp(v, grid) {
  answered = true;
  clearInterval(taTimer);
  hp = Math.max(0, hp - 1);
  streak = 0; wrongList.push(v);
  Array.from(grid.children).forEach(b => { if (b.textContent === v.p) b.className = 'ta-choice reveal'; });
  $('feedback').textContent = '시간 초과! ⏱';
  $('feedback').style.color = '#ff8888';
  $('ta-confirm-btn').style.display = 'none';
  renderHUD();
  if (hp === 0) {
    const nb = $('next-btn');
    nb.textContent = '결과 보기 →'; nb.onclick = showMissionComplete; nb.style.display = 'block';
    return;
  }
  $('next-btn').style.display = 'block';
}

function taConfirm() {
  if (answered || !taSelected) return;
  clearInterval(taTimer);
  answered = true;
  $('ta-confirm-btn').disabled = true;
  const v = queue[idx];
  const grid = $('ta-choices');
  const upgPer = Math.max(1, Math.floor(TOTAL / 5));

  Array.from(grid.children).forEach(b => {
    if (b.textContent === v.p) b.className = 'ta-choice reveal';
    else if (b.textContent === taSelected && taSelected !== v.p) b.className = 'ta-choice wrong';
  });

  if (taSelected === v.p) {
    stars++; streak++;
    $('feedback').textContent = rnd(OK_MSG); $('feedback').style.color = '#44ddaa';
    renderHUD(); renderShips();
    if (stars > 0 && stars % upgPer === 0 && Math.floor(stars / upgPer) <= 4) upgradePending = true;
    setTimeout(() => nextQ(), 600);
  } else {
    hp = Math.max(0, hp - 1); streak = 0; wrongList.push(v);
    $('feedback').textContent = rnd(NG_MSG); $('feedback').style.color = '#ff8888';
    renderHUD();
    if (hp === 0) {
      const nb = $('next-btn');
      nb.textContent = '결과 보기 →'; nb.onclick = showMissionComplete; nb.style.display = 'block';
      return;
    }
    $('next-btn').style.display = 'block';
  }
}

/* ── NEXT ── */
function nextQ() {
  idx++; renderHUD();
  if (upgradePending) {
    upgradePending = false;
    showUpgrade(Math.floor(stars / Math.max(1, Math.floor(TOTAL / 5))));
  } else {
    loadQ();
  }
}

/* ── UPGRADE ── */
function showUpgrade(stage) {
  const s = SHIPS[Math.min(stage, 4)];
  $('up-ship').textContent = s.e;
  $('up-name').textContent = s.name + ' 획득!';
  $('up-desc').textContent = s.desc;
  const pc = $('particles'); pc.innerHTML = '';
  const cols = ['#FAC775','#3399dd','#44ddaa','#bb99ff','#ff5555','#ffffff'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    const a = (i / 30) * 360, d = 60 + Math.random() * 100;
    p.style.cssText = `left:50%;top:40%;background:${cols[i%cols.length]};--tx:${Math.cos(a*Math.PI/180)*d}px;--ty:${Math.sin(a*Math.PI/180)*d}px;animation-delay:${Math.random()*0.15}s`;
    pc.appendChild(p);
  }
  $('upgrade-overlay').classList.add('show');
}

/* ── MISSION COMPLETE ── */
function showMissionComplete() {
  const pct = stars / TOTAL;
  const starCount = pct >= 1 ? 5 : pct >= 0.8 ? 4 : pct >= 0.6 ? 3 : pct >= 0.4 ? 2 : 1;
  const rank = RANKS.find(r => pct >= r.min);
  const success = hp > 0;

  $('mc-glow').textContent = success ? '🏆' : '💫';
  $('mc-label').textContent = success ? 'MISSION COMPLETE' : 'MISSION FAILED';
  $('mc-title').textContent = success ? '임무 완료! 🎉' : '임무 실패...';
  $('mc-stars').textContent = '⭐'.repeat(starCount) + '☆'.repeat(5 - starCount);
  $('mc-score').textContent = stars;
  $('mc-total').textContent = '/ ' + TOTAL + ' 정답  (' + Math.round(pct * 100) + '%)';
  $('mc-rank').textContent = rank.rank;
  $('mc-desc').textContent = rank.desc;

  if (wrongList.length > 0) {
    $('mc-wrong-wrap').style.display = 'block';
    $('mc-wrong-list').innerHTML = wrongList.map(v =>
      `<div class="wi">
        <span class="wi-b">${v.b}</span>
        <span class="wi-arr">→</span>
        <span class="wi-a">${v.p}</span>
        <span class="wi-m">${v.m}</span>
      </div>`
    ).join('');
  } else {
    $('mc-wrong-wrap').style.display = 'none';
  }
  $('mission-overlay').classList.add('show');
}

/* ── EVENT LISTENERS ── */
$('start-btn').addEventListener('click', startGame);
document.getElementById('ta-confirm-btn').addEventListener('click', taConfirm);
$('next-btn').addEventListener('click', nextQ);
$('up-btn').addEventListener('click', () => { $('upgrade-overlay').classList.remove('show'); loadQ(); });
$('mc-home').addEventListener('click', () => {
  $('mission-overlay').classList.remove('show');
  showScreen('screen-start');
});
$('mc-again').addEventListener('click', () => {
  $('mission-overlay').classList.remove('show');
  startGame();
});

/* ── 전역 Enter 키 핸들러 ── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if ($('upgrade-overlay').classList.contains('show')) {
    $('upgrade-overlay').classList.remove('show'); loadQ(); return;
  }
  if ($('mission-overlay').classList.contains('show')) {
    $('mission-overlay').classList.remove('show'); startGame(); return;
  }
  const nb = $('next-btn');
  if (nb.style.display !== 'none') { nb.click(); return; }
});
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(()=>console.log('SW registered'));
}
</script>
</body>
